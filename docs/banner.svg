<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 280" width="1200" height="280">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4c1d95"/>
      <stop offset="55%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
    <pattern id="dots" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <circle cx="20" cy="20" r="1.5" fill="white" opacity="0.12"/>
    </pattern>
    <radialGradient id="glow" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="white" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="280" fill="url(#bgGrad)"/>
  <rect width="1200" height="280" fill="url(#dots)"/>
  <rect width="1200" height="280" fill="url(#glow)"/>

  <!-- Title — large, centered, plenty of clearance -->
  <text x="600" y="125"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', sans-serif"
        font-size="88" font-weight="800" fill="white" text-anchor="middle"
        letter-spacing="-1">MemoMate</text>

  <!-- Subtle accent line under title -->
  <line x1="540" y1="155" x2="660" y2="155" stroke="white" stroke-width="2" opacity="0.55"/>

  <!-- English subtitle -->
  <text x="600" y="200"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', sans-serif"
        font-size="22" font-weight="500" fill="white" text-anchor="middle" opacity="0.96">
    MCP Servers for the Chinese Ecosystem · Portable Cross-Tool Memory
  </text>

  <!-- Chinese subtitle -->
  <text x="600" y="240"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', sans-serif"
        font-size="22" font-weight="500" fill="white" text-anchor="middle" opacity="0.86">
    中文生态 MCP 服务器集合 · 跨工具便携记忆
  </text>
</svg>
